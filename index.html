<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#cce4f6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1720" media="(prefers-color-scheme: dark)" />
    <script>
      (() => {
        const schemes = ["light", "dark", "sunset"];
        let scheme = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        try {
          const saved = localStorage.getItem("color-scheme");
          if (schemes.includes(saved)) scheme = saved;
        } catch {}
        document.documentElement.dataset.scheme = scheme;
        const themeColor = {
          light: "#cce4f6",
          dark: "#0f1720",
          sunset: "#526c8b",
        }[scheme];
        document.querySelectorAll('meta[name="theme-color"]').forEach((meta) => {
          meta.content = themeColor;
        });
      })();
    </script>

    <style>
      :root {
        --fg: oklch(30% 0 0);
        --muted: oklch(46% 0 0);
        --selection: oklch(76% 0.085 240);
        --sky-top: #cce4f6;
        --sky-bottom: #9eccea;
        --scheme-surface: rgb(255 255 255 / 0.5);
        --scheme-surface-hover: rgb(255 255 255 / 0.58);
        color-scheme: light;

        &[data-scheme="dark"] {
          --fg: oklch(93% 0.01 148);
          --muted: oklch(68% 0.02 148);
          --selection: oklch(45% 0.056 240);
          --sky-top: #0f1720;
          --sky-bottom: #131d26;
          --scheme-surface: rgb(0 0 0 / 0.45);
          --scheme-surface-hover: rgb(0 0 0 / 0.55);
          color-scheme: dark;
        }

        &[data-scheme="sunset"] {
          --fg: oklch(94% 0.02 75);
          --muted: oklch(86% 0.025 75);
          --selection: oklch(50% 0.11 45);
          --sky-top: #526c8b;
          --sky-bottom: #354860;
          --scheme-surface: rgb(0 0 0 / 0.45);
          --scheme-surface-hover: rgb(0 0 0 / 0.55);
          color-scheme: dark;
        }

        @media (prefers-color-scheme: dark) {
          &:not([data-scheme]) {
            --fg: oklch(93% 0.01 148);
            --muted: oklch(68% 0.02 148);
            --selection: oklch(45% 0.056 240);
            --sky-top: #0f1720;
            --sky-bottom: #131d26;
            --scheme-surface: rgb(0 0 0 / 0.45);
            --scheme-surface-hover: rgb(0 0 0 / 0.55);
            color-scheme: dark;
          }
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      ::selection {
        background: var(--selection);
        color: var(--fg);
      }

      body {
        height: 100%;
        height: 100dvh;
        padding:
          max(clamp(2.75rem, 6vw, 4.5rem), env(safe-area-inset-top))
          max(clamp(1.5rem, 6vw, 4.5rem), env(safe-area-inset-right))
          max(clamp(5.5rem, 12vw, 9rem), env(safe-area-inset-bottom))
          max(clamp(1.5rem, 6vw, 4.5rem), env(safe-area-inset-left));
        background: linear-gradient(var(--sky-top), var(--sky-bottom)) var(--sky-top);
        color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* The sky canvas paints behind everything; this flat colour is the no-JS /
         no-WebGL fallback. It lives on body, not html, so that it is body's own
         declared background that propagates up to the canvas — html having any
         background of its own would win and body's would never propagate at all. */
      #sky-clip {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        overflow: hidden; /* fallback: overflow:clip is Safari 16+ */
        overflow: clip;
      }

      #sky {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        filter: blur(36px);
        transform: scale(1.12);
        transition:
          filter 5s cubic-bezier(0.45, 0.05, 0.25, 1),
          transform 5s cubic-bezier(0.45, 0.05, 0.25, 1);

        &.sharp {
          filter: blur(0);
          transform: scale(1);
        }

        @media (prefers-reduced-motion: reduce) {
          &,
          &.sharp {
            filter: none;
            transform: none;
            transition: none;
          }
        }
      }

      main {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        justify-content: center;
        align-items: center;
        min-height: 100%;
      }

      h1 {
        font-size: 1rem;
        font-weight: 500;
        letter-spacing: -0.005em;
      }
      p {
        color: var(--muted);
      }

      a {
        font: inherit;
        color: inherit;
        text-decoration-thickness: 1px;
        text-underline-offset: 0.125rem;
        text-decoration-color: color-mix(in srgb, currentColor 50%, transparent);

        &:hover {
          color: var(--fg);
          text-decoration-color: var(--fg);
        }
      }

      :focus-visible {
        outline: 2px solid var(--fg);
        outline-offset: 2px;
        border-radius: 2px;
      }

      nav {
        display: flex;
        gap: 1.5rem;
        color: var(--muted);
      }

      .scheme {
        position: fixed;
        bottom: max(1rem, env(safe-area-inset-bottom));
        right: max(1rem, env(safe-area-inset-right));
        z-index: 1;
        border: 0;
        font: inherit;
        color: var(--fg);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        display: grid;
        width: 2.5rem;
        height: 2.5rem;
        padding: 0;
        place-items: center;
        border-radius: 999px;
        background: var(--scheme-surface);

        &[hidden] {
          display: none;
        }

        @media (hover: hover) {
          &:hover {
            background-blend-mode: screen;
            background:
              radial-gradient(circle at 28% 18%, rgb(255 255 255 / 0.3), transparent 48%)
              var(--scheme-surface-hover);
            -webkit-backdrop-filter: blur(8px) saturate(1.3) brightness(1.05);
            backdrop-filter: blur(8px) saturate(1.3) brightness(1.05);
          }
        }

        &:active {
          scale: 0.96;
        }

        & svg {
          display: none;
          width: 1rem;
          height: 1rem;
          fill: none;
          stroke: currentColor;
          stroke-width: 1.75;
          stroke-linecap: round;
          stroke-linejoin: round;

          :root[data-scheme=light] &[data-scheme=light],
          :root[data-scheme=dark] &[data-scheme=dark],
          :root[data-scheme=sunset] &[data-scheme=sunset] {
            display: block;
          }
        }
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip-path: inset(50%);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div id="sky-clip" aria-hidden="true"><canvas id="sky"></canvas></div>
    <main>

    <button
      id="scheme"
      class="scheme"
      type="button"
      hidden
      aria-label="Choose color scheme"
      aria-describedby="scheme-help"
    >
      <svg data-scheme="light" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="3.5" />
        <path d="M12 2v2m0 16v2M4.93 4.93l1.42 1.42m11.31 11.31 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41" />
      </svg>
      <svg data-scheme="dark" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 15.1A8 8 0 0 1 8.9 4 8 8 0 1 0 20 15.1Z" />
      </svg>
      <svg data-scheme="sunset" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 18h16M6 14h12M8 14a4 4 0 0 1 8 0M12 4v3M5.64 7.64l2.12 2.12M18.36 7.64l-2.12 2.12" />
      </svg>
    </button>
    <span id="scheme-help" class="sr-only" hidden>Cycles through Light, Dark, and Sunset.</span>
    <script>
      (() => {
        const root = document.documentElement;
        const consoleColors = {
          light: ["#cce4f6", "oklch(30% 0 0)", "oklch(46% 0 0)"],
          dark: ["#0f1720", "oklch(93% 0.01 148)", "oklch(68% 0.02 148)"],
          sunset: ["#526c8b", "oklch(94% 0.02 75)", "oklch(86% 0.025 75)"],
        };
        const [consoleBackground, consoleForeground, consoleMuted] =
          consoleColors[root.dataset.scheme] ?? consoleColors.light;
        console.log(
          "%c I see what you did there.                             \n" +
            " → https://aaron-garcia-cv.netlify.app                 \n" +
            "                                                       \n" +
            "%c Cheers,                                               \n" +
            " Aarón                                                 ",
          `background:${consoleBackground};color:${consoleForeground};-webkit-text-fill-color:${consoleForeground};line-height:1.4;padding:4px 0`,
          `background:${consoleBackground};color:${consoleMuted};-webkit-text-fill-color:${consoleMuted};line-height:1.4;padding:4px 0`,
        );

        const schemes = ["light", "dark", "sunset"];
        const labels = { light: "Light", dark: "Dark", sunset: "Sunset" };
        const themeColors = { light: "#cce4f6", dark: "#0f1720", sunset: "#526c8b" };
        const systemDark = matchMedia("(prefers-color-scheme: dark)");
        const trigger = document.getElementById("scheme");
        const help = document.getElementById("scheme-help");

        const nextScheme = (scheme) => schemes[(schemes.indexOf(scheme) + 1) % schemes.length];

        function applyScheme(scheme, persist = false) {
          if (!schemes.includes(scheme)) scheme = "light";
          const next = nextScheme(scheme);
          root.dataset.scheme = scheme;
          document.querySelectorAll('meta[name="theme-color"]').forEach((meta) => {
            meta.content = themeColors[scheme];
          });
          trigger.setAttribute("aria-label", `Color scheme: ${labels[scheme]}. Activate for ${labels[next]}.`);
          trigger.title = `${labels[scheme]} → ${labels[next]}`;
          if (persist) {
            try { localStorage.setItem("color-scheme", scheme); } catch {}
          }
          root.dispatchEvent(new Event("schemechange"));
        }
        trigger.addEventListener("click", () => applyScheme(nextScheme(root.dataset.scheme), true));
        systemDark.addEventListener("change", (event) => {
          let hasSavedScheme = false;
          try { hasSavedScheme = schemes.includes(localStorage.getItem("color-scheme")); } catch {}
          if (!hasSavedScheme) applyScheme(event.matches ? "dark" : "light");
        });
        applyScheme(root.dataset.scheme);
        trigger.hidden = false;
        help.hidden = false;

        const cv = document.getElementById("sky");
        const gl =
          cv &&
          cv.getContext("webgl", {
            alpha: false,
            antialias: false,
            depth: false,
            stencil: false,
            powerPreference: "low-power",
          });
        if (!gl) return;
        const PX = 3; // CSS px per dithered cell
        const VS = `attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}`;
        const FS = `precision highp float;
uniform vec2 uRes;uniform float uTime,uFall,uDark;uniform vec4 uCore;
uniform vec3 c0,c1,c2,c3,c4;
float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}
float fbm(vec2 p){float s=0.,a=.5;for(int i=0;i<3;i++){s+=a*noise(p);p*=2.;a*=.5;}return s/.875;}
// compact ordered 8x8 — WebGL1 has no integer bit ops, so it is built by recursion
float b2(vec2 a){a=floor(a);return fract(a.x*.5+a.y*a.y*.75);}
float b4(vec2 a){return b2(.5*a)*.25+b2(a);}
float b8(vec2 a){return b4(.5*a)*.25+b2(a);}
void main(){
  vec2 p=vec2(gl_FragCoord.x,uRes.y-gl_FragCoord.y); // top-left origin
  float c=fbm(vec2(p.x*.016+uTime*.14,p.y*.026+uTime*.015));
  c=clamp((c-.44)*2.6,0.,1.);
  // deepens away from the sun in the top-left, so grade and glow pull the same way
  float v=(.46-.34*(p.y/uRes.y))+c*.8;
  vec2 d=max(max(uCore.xy-p,vec2(0.)),p-uCore.zw);
  float g=1.-smoothstep(0.,uFall,length(d));
  // clamp, don't overwrite: the sky is only stopped from going deep where the text
  // sits, so clouds keep drifting through it and the worst-case pixel behind the
  // type is pinned to a known ramp step at every frame and every viewport.
  v=mix(max(v,.5*g),min(v,1.-.55*g),uDark);
  v=clamp(v,0.,1.);
  // step() is >=, so a zero threshold rounds *up*: the reachable index is
  // floor(v*4)+1, not floor(v*4). The glow's clamps are chosen to keep v off the
  // integer boundary for that reason — landing exactly on it leaks one index further
  // than the contrast budget allows.
  float lv=v*4.,i=floor(lv);
  vec2 cell=floor(gl_FragCoord.xy),tile=floor(cell/8.);
  vec2 phase=floor(vec2(hash(tile+vec2(17.,53.)),hash(tile+vec2(71.,29.)))*8.);
  float ordered=b8(cell),shifted=b8(cell+phase);
  float threshold=mix(ordered,shifted,.18*smoothstep(.65,1.,g));
  float idx=clamp(i+step(threshold,lv-i),0.,4.);
  vec3 col=c0;
  col=mix(col,c1,step(.5,idx));
  col=mix(col,c2,step(1.5,idx));
  col=mix(col,c3,step(2.5,idx));
  col=mix(col,c4,step(3.5,idx));
  gl_FragColor=vec4(col,1.);
}`;
        const sh = (type, src) => {
          const s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s);
          return s;
        };
        let prog;
        try {
          prog = gl.createProgram();
          gl.attachShader(prog, sh(gl.VERTEX_SHADER, VS));
          gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FS));
          gl.linkProgram(prog);
          if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw gl.getProgramInfoLog(prog);
        } catch (e) {
          return;
        }
        gl.useProgram(prog);

        // one fullscreen triangle: fewer verts than a quad and no seam down the middle
        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
        const loc = gl.getAttribLocation(prog, "a");
        gl.enableVertexAttribArray(loc);
        gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

        const U = (n) => gl.getUniformLocation(prog, n);
        const uRes = U("uRes"), uTime = U("uTime"), uFall = U("uFall"), uDark = U("uDark"), uCore = U("uCore");
        const RAMP = {
          light: [[74, 150, 208], [125, 186, 226], [173, 214, 240], [216, 234, 248], [252, 252, 252]],
          dark: [[8, 13, 8], [16, 25, 34], [27, 42, 56], [50, 74, 96], [84, 116, 144]],
          sunset: [[39, 49, 70], [53, 67, 91], [68, 86, 112], [182, 112, 81], [218, 168, 116]],
        };

        const still = matchMedia("(prefers-reduced-motion: reduce)");
        let W = 0, H = 0;
        function setRamp() {
          const scheme = schemes.includes(root.dataset.scheme) ? root.dataset.scheme : "light";
          const r = RAMP[scheme];
          ["c0", "c1", "c2", "c3", "c4"].forEach((n, i) =>
            gl.uniform3f(U(n), r[i][0] / 255, r[i][1] / 255, r[i][2] / 255),
          );
          gl.uniform1f(uDark, scheme === "light" ? 0 : 1);
        }
        // The glow is anchored to the text's real box, not to viewport proportions.
        // The clouds drift, so anywhere the glow misses will sooner or later have deep
        // sky behind it — measuring the content is what makes the contrast hold.
        function measure() {
          const rg = document.createRange();
          rg.selectNodeContents(document.querySelector("main"));
          const r = rg.getBoundingClientRect(); // union of line boxes, not the block's full width
          const pad = 26;
          gl.uniform4f(uCore, (r.left - pad) / PX, (r.top - pad) / PX, (r.right + pad) / PX, (r.bottom + pad) / PX);
          // The falloff is aesthetic only — the core is what guarantees contrast — so
          // it can shrink freely. A flat 240px swallowed the whole screen on short
          // viewports (landscape phones), washing the sky out to nothing.
          gl.uniform1f(uFall, Math.min(240, innerHeight * 0.3) / PX);
        }
        function resize() {
          W = Math.max(1, Math.ceil(innerWidth / PX));
          H = Math.max(1, Math.ceil(innerHeight / PX));
          cv.width = W;
          cv.height = H;
          gl.viewport(0, 0, W, H);
          gl.uniform2f(uRes, W, H);
          measure();
        }
        function draw(t) {
          gl.uniform1f(uTime, t);
          gl.drawArrays(gl.TRIANGLES, 0, 3);
        }
        let raf = 0, last = 0;
        function loop(ms) {
          // ~30fps. Cheap on the GPU now, but the clouds drift far too slowly for
          // anyone to tell it from 60, and this is a decorative background.
          if (ms - last > 33) { last = ms; draw(ms / 1000); }
          raf = requestAnimationFrame(loop);
        }
        function start() {
          cancelAnimationFrame(raf);
          setRamp();
          resize();
          // Always paint one frame synchronously. A WebGL canvas is opaque black
          // until its first draw, and this script runs before first paint — without
          // this the intro would spend its first frames blurring black.
          draw(performance.now() / 1000);
          if (!(still.matches || document.hidden)) { last = 0; raf = requestAnimationFrame(loop); }
        }
        addEventListener("resize", start);
        document.addEventListener("visibilitychange", start);
        root.addEventListener("schemechange", start);
        still.addEventListener("change", start);
        cv.addEventListener("webglcontextlost", (e) => { e.preventDefault(); cancelAnimationFrame(raf); });
        cv.addEventListener("webglcontextrestored", start);
        start();

        // Kick the focus pull after one frame, so blur(36px) is the resolved starting
        // style to transition *from*. Outside start(), so a resize never replays it.
        requestAnimationFrame(() => cv.classList.add("sharp"));
        // Once sharp, drop the filter entirely: blur(0) still costs a filter pass on
        // every frame of a full-screen canvas that never stops redrawing.
        cv.addEventListener("transitionend", (e) => {
          if (e.propertyName !== "filter") return;
          cv.style.filter = "none";
          cv.style.transform = "none";
        });
      })();
    </script>
  </body>
</html>
